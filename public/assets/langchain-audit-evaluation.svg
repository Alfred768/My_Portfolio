<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LangChain multi-agent audit evaluation framework</title>
  <desc id="desc">An engineering dashboard showing a multi-agent audit workflow, BERT evaluation harness, correction feedback loop, and benchmark results.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#313c43" stroke-width="1"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111820" flood-opacity=".2"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#eceeea"/>
  <rect x="28" y="26" width="1144" height="708" rx="18" fill="#182128" filter="url(#shadow)"/>
  <rect x="28" y="26" width="1144" height="62" rx="18" fill="#222d34"/>
  <circle cx="60" cy="57" r="7" fill="#f4c95c"/><path d="M56 57h8M60 53v8" stroke="#3a2f11" stroke-width="2"/>
  <text x="84" y="63" fill="#f6f7f5" font-family="Arial, sans-serif" font-size="17" font-weight="700">AUDITFLOW / MULTI-AGENT EVALUATION</text>
  <rect x="938" y="43" width="92" height="28" rx="7" fill="#2c393f"/><text x="984" y="61" fill="#afbcc1" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">200 PAIRS</text>
  <rect x="1042" y="43" width="102" height="28" rx="7" fill="#e7f4ec"/><circle cx="1060" cy="57" r="5" fill="#4ea976"/><text x="1100" y="61" fill="#28744c" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">RUN PASSED</text>

  <rect x="52" y="112" width="770" height="378" rx="10" fill="url(#grid)" stroke="#344149"/>
  <text x="76" y="146" fill="#e7ebec" font-family="Arial, sans-serif" font-size="13" font-weight="700">Agent execution graph</text>
  <text x="76" y="167" fill="#7f9098" font-family="Arial, sans-serif" font-size="9">Evidence retrieval, control testing, synthesis, and reviewer correction</text>
  <g fill="none" stroke="#61727a" stroke-width="2"><path d="M174 287H286M406 287H518M638 287H732"/><path d="M578 348V405H344V348"/></g>
  <g fill="#61727a"><path d="M286 287l-10-6v12z"/><path d="M518 287l-10-6v12z"/><path d="M732 287l-10-6v12z"/></g>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="86" y="224" width="88" height="126" rx="8" fill="#253039" stroke="#5f7884"/>
    <circle cx="130" cy="263" r="17" fill="#315061"/><text x="130" y="268" fill="#d6e8f0" font-size="14" font-weight="700">01</text><text x="130" y="310" fill="#f0f3f4" font-size="10" font-weight="700">EVIDENCE</text><text x="130" y="328" fill="#86969e" font-size="8">retrieve</text>
    <rect x="286" y="224" width="120" height="126" rx="8" fill="#253039" stroke="#5f7884"/>
    <circle cx="346" cy="263" r="17" fill="#574d2a"/><text x="346" y="268" fill="#fff2bd" font-size="14" font-weight="700">02</text><text x="346" y="310" fill="#f0f3f4" font-size="10" font-weight="700">CONTROL TEST</text><text x="346" y="328" fill="#86969e" font-size="8">evaluate</text>
    <rect x="518" y="224" width="120" height="126" rx="8" fill="#253039" stroke="#5f7884"/>
    <circle cx="578" cy="263" r="17" fill="#3a5947"/><text x="578" y="268" fill="#d8f5e4" font-size="14" font-weight="700">03</text><text x="578" y="310" fill="#f0f3f4" font-size="10" font-weight="700">SYNTHESIS</text><text x="578" y="328" fill="#86969e" font-size="8">draft report</text>
    <rect x="732" y="224" width="66" height="126" rx="8" fill="#f4c95c" stroke="#f4c95c"/>
    <path d="M750 267l11 11 21-25" fill="none" stroke="#493b14" stroke-width="5" stroke-linecap="round"/><text x="765" y="310" fill="#433610" font-size="9" font-weight="700">AUDIT</text><text x="765" y="326" fill="#69571e" font-size="8">ready</text>
    <rect x="344" y="388" width="234" height="64" rx="8" fill="#2a363d" stroke="#647780"/><text x="461" y="414" fill="#f1f3f3" font-size="10" font-weight="700">AUDITOR CORRECTION EVENT</text><text x="461" y="435" fill="#8da0a8" font-size="9">updates reference distribution</text>
  </g>

  <rect x="846" y="112" width="302" height="378" rx="10" fill="#f8f8f4"/>
  <text x="870" y="146" fill="#2d3c42" font-family="Arial, sans-serif" font-size="13" font-weight="700">BERT evaluation harness</text>
  <text x="870" y="184" fill="#718087" font-family="Arial, sans-serif" font-size="9" font-weight="700">HUMAN ALIGNMENT</text>
  <text x="870" y="232" fill="#17282f" font-family="Arial, sans-serif" font-size="38" font-weight="700">85%</text>
  <rect x="870" y="250" width="254" height="10" rx="5" fill="#e0e5e4"/><rect x="870" y="250" width="216" height="10" rx="5" fill="#4ea976"/>
  <text x="870" y="298" fill="#718087" font-family="Arial, sans-serif" font-size="9" font-weight="700">BASELINE COMPARISON</text>
  <rect x="870" y="316" width="254" height="58" rx="8" fill="#fff" stroke="#d7dddc"/>
  <text x="888" y="340" fill="#45575e" font-family="Arial, sans-serif" font-size="10">BERT embedding</text><text x="1106" y="340" fill="#2d7550" font-family="Arial, sans-serif" font-size="11" text-anchor="end" font-weight="700">85%</text>
  <text x="888" y="360" fill="#75858b" font-family="Arial, sans-serif" font-size="9">Keyword overlap</text><text x="1106" y="360" fill="#8b6a32" font-family="Arial, sans-serif" font-size="10" text-anchor="end">61%</text>
  <text x="870" y="410" fill="#718087" font-family="Arial, sans-serif" font-size="9" font-weight="700">REFERENCE SET</text>
  <rect x="870" y="428" width="254" height="40" rx="8" fill="#e9f1ee"/><circle cx="890" cy="448" r="6" fill="#4ea976"/><text x="906" y="452" fill="#3d5f50" font-family="Arial, sans-serif" font-size="10">200 expert-annotated pairs</text>

  <g font-family="Arial, sans-serif">
    <rect x="52" y="514" width="344" height="192" rx="10" fill="#222d34" stroke="#344149"/>
    <text x="76" y="548" fill="#e7ebec" font-size="13" font-weight="700">Completion time</text>
    <text x="76" y="586" fill="#7f9098" font-size="9" font-weight="700">MANUAL</text><text x="372" y="588" fill="#c3ccd0" font-size="12" text-anchor="end">~45 min</text>
    <rect x="76" y="600" width="296" height="9" rx="5" fill="#39464d"/><rect x="76" y="600" width="280" height="9" rx="5" fill="#8c7741"/>
    <text x="76" y="641" fill="#7f9098" font-size="9" font-weight="700">AUTOMATED</text><text x="372" y="643" fill="#a9e0bf" font-size="12" text-anchor="end">~8 min</text>
    <rect x="76" y="655" width="296" height="9" rx="5" fill="#39464d"/><rect x="76" y="655" width="53" height="9" rx="5" fill="#4ea976"/>

    <rect x="420" y="514" width="374" height="192" rx="10" fill="#222d34" stroke="#344149"/>
    <text x="444" y="548" fill="#e7ebec" font-size="13" font-weight="700">Correction data flywheel</text>
    <circle cx="512" cy="616" r="43" fill="none" stroke="#47565d" stroke-width="12"/><path d="M512 573a43 43 0 0 1 38 63" fill="none" stroke="#f4c95c" stroke-width="12" stroke-linecap="round"/>
    <path d="M552 626l7 14-16-1" fill="#f4c95c"/>
    <text x="586" y="592" fill="#b9c4c8" font-size="10">auditor correction</text><text x="586" y="619" fill="#b9c4c8" font-size="10">reference update</text><text x="586" y="646" fill="#b9c4c8" font-size="10">agent improvement</text>
    <circle cx="571" cy="588" r="4" fill="#5f7380"/><circle cx="571" cy="615" r="4" fill="#5f7380"/><circle cx="571" cy="642" r="4" fill="#5f7380"/>

    <rect x="818" y="514" width="330" height="192" rx="10" fill="#f4c95c"/>
    <text x="842" y="548" fill="#4b3d14" font-size="10" font-weight="700">WORKFLOW OUTCOME</text>
    <text x="842" y="610" fill="#2f260d" font-size="34" font-weight="700">40%</text>
    <text x="842" y="637" fill="#5d4d1d" font-size="11">workflow efficiency improvement</text>
    <rect x="842" y="658" width="282" height="26" rx="7" fill="#fff3bf"/><text x="983" y="675" fill="#5c4b18" font-size="9" text-anchor="middle" font-weight="700">BENCHMARK UPDATES WITH AGENT BEHAVIOR</text>
  </g>
</svg>
