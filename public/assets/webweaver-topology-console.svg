    <rect x="780" y="614" width="368" height="92" rx="10" fill="#fff3e9" stroke="#edc5a4"/>
    <text x="804" y="644" fill="#a46a3b" font-size="9" font-weight="700">ATTACK SURFACE</text><text x="804" y="680" fill="#6f4125" font-size="12" font-weight="700">One arbitrary agent context</text>
