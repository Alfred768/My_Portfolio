<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Model router observability dashboard</title>
  <desc id="desc">An engineering dashboard showing traffic routing across language models, latency, cost, and evaluation quality.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f6f9fb"/><stop offset="1" stop-color="#e7eff3"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18333f" flood-opacity=".14"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#e7eff2"/>
  <rect x="28" y="26" width="1144" height="708" rx="18" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="28" y="26" width="1144" height="62" rx="18" fill="#fdfefe"/>
  <rect x="54" y="43" width="32" height="32" rx="8" fill="#153f50"/><path d="M65 62l5-8 5 8 5-8" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="100" y="63" fill="#1c3540" font-family="Arial, sans-serif" font-size="17" font-weight="700">ROUTER LAB / PRODUCTION OBSERVABILITY</text>
  <rect x="954" y="44" width="88" height="27" rx="7" fill="#e8f6ee"/><circle cx="970" cy="57" r="5" fill="#42a66f"/><text x="982" y="61" fill="#29744c" font-family="Arial, sans-serif" font-size="10">HEALTHY</text>
  <rect x="1054" y="44" width="92" height="27" rx="7" fill="#153f50"/><text x="1074" y="62" fill="#fff" font-family="Arial, sans-serif" font-size="10">LIVE TRAFFIC</text>

  <rect x="52" y="112" width="220" height="594" rx="10" fill="#fff" stroke="#d2dde1"/>
  <text x="76" y="147" fill="#70858e" font-family="Arial, sans-serif" font-size="9" font-weight="700">ROUTING POLICY</text>
  <rect x="68" y="166" width="188" height="64" rx="8" fill="#edf4f6" stroke="#bdd1d8"/>
  <text x="86" y="191" fill="#24424f" font-family="Arial, sans-serif" font-size="12" font-weight="700">Quality first</text><text x="86" y="212" fill="#71858d" font-family="Arial, sans-serif" font-size="9">balanced latency + cost</text>
  <text x="76" y="272" fill="#70858e" font-family="Arial, sans-serif" font-size="9" font-weight="700">MODEL POOL</text>
  <g font-family="Arial, sans-serif">
    <rect x="68" y="290" width="188" height="62" rx="8" fill="#fff" stroke="#d2dde1"/><circle cx="89" cy="312" r="7" fill="#365eff"/><text x="105" y="316" fill="#304853" font-size="11" font-weight="700">GPT-4.1</text><text x="86" y="338" fill="#7b8e96" font-size="9">42% traffic / 1.2s</text>
    <rect x="68" y="364" width="188" height="62" rx="8" fill="#fff" stroke="#d2dde1"/><circle cx="89" cy="386" r="7" fill="#c86a46"/><text x="105" y="390" fill="#304853" font-size="11" font-weight="700">Claude</text><text x="86" y="412" fill="#7b8e96" font-size="9">31% traffic / 1.5s</text>
    <rect x="68" y="438" width="188" height="62" rx="8" fill="#fff" stroke="#d2dde1"/><circle cx="89" cy="460" r="7" fill="#2e9b7a"/><text x="105" y="464" fill="#304853" font-size="11" font-weight="700">Llama local</text><text x="86" y="486" fill="#7b8e96" font-size="9">27% traffic / 0.7s</text>
  </g>
  <text x="76" y="548" fill="#70858e" font-family="Arial, sans-serif" font-size="9" font-weight="700">FALLBACKS</text>
  <rect x="68" y="566" width="188" height="48" rx="8" fill="#f9fbfc" stroke="#d2dde1"/><text x="86" y="595" fill="#425c66" font-family="Arial, sans-serif" font-size="10">Circuit breaker enabled</text>
  <rect x="68" y="626" width="188" height="48" rx="8" fill="#f9fbfc" stroke="#d2dde1"/><text x="86" y="655" fill="#425c66" font-family="Arial, sans-serif" font-size="10">Semantic cache enabled</text>

  <g font-family="Arial, sans-serif">
    <rect x="296" y="112" width="268" height="132" rx="10" fill="#fff" stroke="#d2dde1"/>
    <text x="318" y="144" fill="#70858e" font-size="9" font-weight="700">REQUESTS / MIN</text><text x="318" y="190" fill="#1f3b47" font-size="31" font-weight="700">18,420</text><text x="318" y="218" fill="#399568" font-size="10">+12.8% from last hour</text>
    <rect x="580" y="112" width="268" height="132" rx="10" fill="#fff" stroke="#d2dde1"/>
    <text x="602" y="144" fill="#70858e" font-size="9" font-weight="700">P95 LATENCY</text><text x="602" y="190" fill="#1f3b47" font-size="31" font-weight="700">1.32s</text><text x="602" y="218" fill="#399568" font-size="10">-180ms after routing</text>
    <rect x="864" y="112" width="282" height="132" rx="10" fill="#153f50"/>
    <text x="886" y="144" fill="#9bc0cf" font-size="9" font-weight="700">QUALITY SCORE</text><text x="886" y="190" fill="#fff" font-size="31" font-weight="700">94.7</text><text x="886" y="218" fill="#b6d7e3" font-size="10">evaluation gate passing</text>
  </g>

  <rect x="296" y="264" width="552" height="290" rx="10" fill="#fff" stroke="#d2dde1"/>
  <text x="320" y="298" fill="#304853" font-family="Arial, sans-serif" font-size="13" font-weight="700">Traffic and latency</text>
  <text x="320" y="320" fill="#82949b" font-family="Arial, sans-serif" font-size="9">Last 60 minutes / adaptive routing enabled</text>
  <g stroke="#e1e8eb" stroke-width="1"><path d="M320 368H820M320 414H820M320 460H820M320 506H820"/></g>
  <path d="M322 480C370 462 394 467 430 432S502 449 542 405S616 389 658 374S726 398 818 342" fill="none" stroke="#2e82a5" stroke-width="4"/>
  <path d="M322 500C365 490 400 502 440 477S514 489 554 458S620 470 666 438S744 459 818 420" fill="none" stroke="#48af83" stroke-width="3"/>
  <circle cx="818" cy="342" r="5" fill="#2e82a5"/><circle cx="818" cy="420" r="5" fill="#48af83"/>
  <rect x="320" y="334" width="12" height="4" rx="2" fill="#2e82a5"/><text x="340" y="340" fill="#647982" font-family="Arial, sans-serif" font-size="9">requests</text>
  <rect x="402" y="334" width="12" height="4" rx="2" fill="#48af83"/><text x="422" y="340" fill="#647982" font-family="Arial, sans-serif" font-size="9">latency</text>

  <rect x="864" y="264" width="282" height="290" rx="10" fill="#fff" stroke="#d2dde1"/>
  <text x="888" y="298" fill="#304853" font-family="Arial, sans-serif" font-size="13" font-weight="700">Decision trace</text>
  <g font-family="Arial, sans-serif">
    <circle cx="902" cy="342" r="8" fill="#365eff"/><text x="922" y="339" fill="#3e555f" font-size="10" font-weight="700">Intent classified</text><text x="922" y="356" fill="#84969d" font-size="9">complex reasoning / high value</text>
    <path d="M902 352V390" stroke="#cbd7db" stroke-width="2"/>
    <circle cx="902" cy="402" r="8" fill="#2e9b7a"/><text x="922" y="399" fill="#3e555f" font-size="10" font-weight="700">Policy evaluated</text><text x="922" y="416" fill="#84969d" font-size="9">quality threshold 0.90</text>
    <path d="M902 412V450" stroke="#cbd7db" stroke-width="2"/>
    <circle cx="902" cy="462" r="8" fill="#c86a46"/><text x="922" y="459" fill="#3e555f" font-size="10" font-weight="700">Model selected</text><text x="922" y="476" fill="#84969d" font-size="9">GPT-4.1 / region us-east</text>
    <rect x="888" y="505" width="234" height="28" rx="7" fill="#eaf6ef"/><text x="1005" y="523" fill="#337a55" font-size="9" text-anchor="middle" font-weight="700">TRACE ACCEPTED / SCORE 0.96</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="296" y="574" width="268" height="132" rx="10" fill="#fff" stroke="#d2dde1"/>
    <text x="318" y="606" fill="#70858e" font-size="9" font-weight="700">COST / 1K REQUESTS</text><text x="318" y="652" fill="#1f3b47" font-size="27" font-weight="700">$2.84</text><text x="318" y="680" fill="#399568" font-size="10">22% lower</text>
    <rect x="580" y="574" width="268" height="132" rx="10" fill="#fff" stroke="#d2dde1"/>
    <text x="602" y="606" fill="#70858e" font-size="9" font-weight="700">CACHE HIT RATE</text><text x="602" y="652" fill="#1f3b47" font-size="27" font-weight="700">38.6%</text><rect x="602" y="670" width="214" height="7" rx="4" fill="#e4ecef"/><rect x="602" y="670" width="83" height="7" rx="4" fill="#48af83"/>
    <rect x="864" y="574" width="282" height="132" rx="10" fill="#fff8eb" stroke="#ead3a5"/>
    <text x="886" y="606" fill="#9b7036" font-size="9" font-weight="700">SAFETY FALLBACKS</text><text x="886" y="652" fill="#65471f" font-size="27" font-weight="700">0.18%</text><text x="886" y="680" fill="#a07c4d" font-size="10">within operating target</text>
  </g>
</svg>
